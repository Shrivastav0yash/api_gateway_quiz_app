spring:
  application:
    name: api_gateway_quiz

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: quiz-service
              uri: lb://QUIZ-SERVICE
              predicates:
                - Path=/quiz/**

            - id: question-service
              uri: lb://QUESTION-SERVICE
              predicates:
                - Path=/question/**

server:
  port: 8765

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"